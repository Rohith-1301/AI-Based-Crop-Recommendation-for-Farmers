{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center my-5">
    <div class="col-md-5">
        <div class="card card-custom border-0 shadow p-4 bg-white">
            <h3 class="text-center text-agri fw-bold mb-4"><i class="fa-solid fa-lock me-2"></i>Portal Portal Login</h3>
            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3"><label class="form-label fw-semibold">Username or Email Address</label><input type="text" name="username" class="form-control" required placeholder="Username/Email"></div>
                <div class="mb-4"><label class="form-label fw-semibold">Secure Key Password</label><input type="password" name="password" class="form-control" required placeholder="••••••••"></div>
                <button type="submit" class="btn btn-agri w-100 py-2 rounded-pill fw-bold">Authenticate Security Metrics</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
